{{- if .Values.postgres.enabled }}
{{- $fullname := include "dialog-backend.fullname" . -}}
{{- $clusterName := printf "%s-db" $fullname -}}
{{- $auth := .Values.postgres.auth -}}
---
# Owner-role credentials consumed by CNPG's initdb bootstrap.
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-db-app
  labels:
    {{- include "dialog-backend.labels" . | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ $auth.username | quote }}
  password: {{ $auth.password | quote }}
---
# Connection URI the backend consumes as DATABASE_URL. Points at the CNPG
# read-write service (<cluster>-rw). Kept at a stable name so Step 9's
# workloads can reference it regardless of the CNPG-generated app secret.
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-db
  labels:
    {{- include "dialog-backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  uri: {{ printf "postgresql://%s:%s@%s-rw:5432/%s" $auth.username $auth.password $clusterName $auth.database | quote }}
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ $clusterName }}
  labels:
    {{- include "dialog-backend.labels" . | nindent 4 }}
spec:
  instances: {{ .Values.postgres.cluster.instances }}
  imageName: {{ .Values.postgres.cluster.image }}

  bootstrap:
    # Schema is managed by Alembic (the api Deployment's `migrate`
    # initContainer runs `alembic upgrade head` on every rollout — see
    # Step 9). CNPG only creates the empty database + owner role, enables
    # the pgvector extension, and grants schema privileges.
    initdb:
      database: {{ $auth.database }}
      owner: {{ $auth.username }}
      secret:
        name: {{ $fullname }}-db-app
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS vector
        - GRANT ALL ON SCHEMA public TO {{ $auth.username | quote }}
        - ALTER DEFAULT PRIVILEGES FOR ROLE postgres IN SCHEMA public GRANT ALL ON TABLES TO {{ $auth.username | quote }}
        - ALTER DEFAULT PRIVILEGES FOR ROLE postgres IN SCHEMA public GRANT ALL ON SEQUENCES TO {{ $auth.username | quote }}

  {{- with .Values.postgres.pgvector.image }}
  # pgvector via CNPG image-volume extensions (CNPG >= 1.29). The extension
  # binary/control files are mounted from this image so `CREATE EXTENSION
  # vector` above succeeds. On older CNPG, remove this block and instead use
  # an operand image that already ships postgresql-<major>-pgvector.
  postgresql:
    extensions:
      - name: pgvector
        image:
          reference: {{ . }}
  {{- end }}

  storage:
    {{- with .Values.postgres.persistence.storageClass }}
    storageClass: {{ . }}
    {{- end }}
    size: {{ .Values.postgres.persistence.size }}
{{- end }}
