{{- $fullname := include "dialog-backend.fullname" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "dialog-backend.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "dialog-backend.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "dialog-backend.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      initContainers:
        # Apply Alembic migrations before the API starts. Idempotent — safe
        # on every rollout. Only needs DATABASE_URL.
        - name: migrate
          image: {{ include "dialog-backend.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["uv", "run", "alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
            {{- if .Values.postgres.enabled }}
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-db
                  key: uri
            {{- else }}
              value: {{ .Values.postgres.uri | quote }}
            {{- end }}
      containers:
        - name: api
          image: {{ include "dialog-backend.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["uv", "run", "python", "main.py", "api"]
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ $fullname }}-config
          env:
            {{- include "dialog-backend.coreEnv" . | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
