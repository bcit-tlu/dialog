{{- if .Values.gateway.enabled }}
{{- $fullname := include "dialog-backend.fullname" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-gateway
  labels:
    {{- include "dialog-backend.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "dialog-backend.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        {{- include "dialog-backend.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
    spec:
      containers:
        - name: gateway
          image: {{ include "dialog-backend.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["uv", "run", "python", "main.py", "gateway"]
          env:
            - name: GATEWAY_PORT
              value: {{ .Values.gateway.port | quote }}
            {{- include "dialog-backend.llmCredsEnv" . | nindent 12 }}
          envFrom:
            # Provider selection + Ollama/Azure non-secret settings.
            - configMapRef:
                name: {{ $fullname }}-config
          ports:
            - name: http
              containerPort: {{ .Values.gateway.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
