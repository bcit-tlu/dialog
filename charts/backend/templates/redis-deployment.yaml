{{- if .Values.redis.enabled }}
{{- $fullname := include "dialog-backend.fullname" . -}}
{{- $name := printf "%s-redis" $fullname -}}
{{- $persist := .Values.redis.persistence -}}
---
{{- if $persist.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $name }}
  labels:
    {{- include "dialog-backend.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- with $persist.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ $persist.size }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "dialog-backend.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  # Single-instance Redis owns a RWO volume; never run two replicas.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "dialog-backend.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "dialog-backend.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image | quote }}
          imagePullPolicy: IfNotPresent
          {{- if $persist.enabled }}
          # Enable AOF persistence when a PVC is attached.
          args: ["redis-server", "--appendonly", "yes"]
          {{- end }}
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          {{- if $persist.enabled }}
          persistentVolumeClaim:
            claimName: {{ $name }}
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "dialog-backend.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    {{- include "dialog-backend.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
{{- end }}
