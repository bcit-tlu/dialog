{{- if not .Values.llm.existingSecret }}
# Chart-managed LLM credentials Secret. Created only when llm.existingSecret
# is empty; when set, workloads reference that Secret instead (Vault-ready).
# Keys are pinned so both paths are interchangeable:
#   ollama-api-key       -> OLLAMA_API_KEY
#   azure-openai-api-key -> AZURE_OPENAI_API_KEY
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dialog-backend.fullname" . }}-llm
  labels:
    {{- include "dialog-backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  ollama-api-key: {{ .Values.llm.ollama.apiKey | quote }}
  azure-openai-api-key: {{ .Values.llm.azure.apiKey | quote }}
{{- end }}
