# Default values for the dialog-frontend chart.

nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/bcit-tlu/dialog/dialog-frontend
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

# Backend service discovery. The chart builds a cluster-internal FQDN
# (<host>.<namespace>.svc.cluster.local:<port>) unless env.BACKEND_URL
# overrides it entirely.
backend:
  host: dialog-backend
  port: 8000
  namespace: ""

env:
  # Explicit override for the nginx upstream. Leave empty to auto-build
  # the backend Service FQDN (see dialog-frontend.backendUrl helper).
  BACKEND_URL: ""
  # nginx DNS resolver used for runtime re-resolution of the backend
  # Service. Defaults to the Kubernetes cluster DNS service address.
  NGINX_DNS_RESOLVER: "kube-dns.kube-system.svc.cluster.local"

ingress:
  enabled: false
  className: ""
  annotations:
    # Allow large course-module (D2L zip) uploads through the ingress.
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
  hosts: []
  tls: []

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
