services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 5s
      retries: 5

  api:
    build: ./services/api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    depends_on:
      ollama:
        condition: service_healthy
      chromadb:
        condition: service_healthy

  frontend:
    build: ./services/frontend
    ports:
      - "3000:3000"
    environment:
      API_URL: http://api:8000
    depends_on:
      - api

  ingestion:
    build: ./services/api
    entrypoint: ["uv", "run", "python", "ingest_docs.py"]
    volumes:
      - ./docs:/app/docs
    env_file: .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    depends_on:
      ollama:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    profiles: ["tools"]

volumes:
  ollama_data:
  chroma_data:
