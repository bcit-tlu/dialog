services:
  api:
    build: .
    command: ["uv", "run", "python", "main.py", "api"]
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://dialog:dialog@db:5432/dialog
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: uploads
      LLM_GATEWAY_URL: http://llm-gateway:8100
    depends_on:
      redis:
        condition: service_started
      minio:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  worker:
    build: .
    command: ["uv", "run", "python", "main.py", "worker"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://dialog:dialog@db:5432/dialog
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: uploads
      LLM_GATEWAY_URL: http://llm-gateway:8100
    depends_on:
      redis:
        condition: service_started
      minio:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  migrate:
    build: .
    command: ["uv", "run", "alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql://dialog:dialog@db:5432/dialog
    depends_on:
      db:
        condition: service_healthy

  llm-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uv", "run", "python", "main.py", "gateway"]
    ports:
      - "8100:8100"
    env_file: .env
    environment:
      GATEWAY_PORT: 8100

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: dialog
      POSTGRES_USER: dialog
      POSTGRES_PASSWORD: dialog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dialog"]
      interval: 2s
      timeout: 3s
      retries: 15

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 2;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/uploads --ignore-existing;
      echo 'Bucket created';
      "

volumes:
  pgdata:
  minio_data:
